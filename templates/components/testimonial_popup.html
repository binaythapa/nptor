{% if show_testimonial_popup %}

<div id="testimonialModal" class="testimonial-modal">
  <div class="testimonial-box">
    <h3>🎉 Congratulations!</h3>
    <p>Would you like to share your experience?</p>

    <form method="post" action="{% url 'pages:submit_testimonial' %}">
      {% csrf_token %}

      <!-- Redirect back to same page -->
      <input type="hidden" name="next" value="{{ request.get_full_path }}">

      <!-- Dynamic relation fields -->
      {% if testimonial_exam_track %}
        <input type="hidden"
               name="exam_track"
               value="{{ testimonial_exam_track.id }}">
      {% endif %}

      {% if testimonial_course %}
        <input type="hidden"
               name="course"
               value="{{ testimonial_course.id }}">
      {% endif %}

      {% if testimonial_study_plan %}
        <input type="hidden"
               name="study_plan"
               value="{{ testimonial_study_plan.id }}">
      {% endif %}

      <textarea name="message"
                placeholder="Share your experience..."
                required
                style="width:100%; height:90px; margin-bottom:12px;"></textarea>

      <select name="rating"
              style="width:100%; margin-bottom:12px;">
        <option value="5">⭐⭐⭐⭐⭐ Excellent</option>
        <option value="4">⭐⭐⭐⭐ Very Good</option>
        <option value="3">⭐⭐⭐ Good</option>
      </select>

      <div class="modal-buttons">
        <button type="submit" class="btn-primary">
          Submit
        </button>

        <button type="button" onclick="closeModal()">
          Later
        </button>
      </div>
    </form>
  </div>
</div>

<style>
.testimonial-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.testimonial-box {
  background: #fff;
  padding: 24px;
  border-radius: 8px;
  width: 420px;
  max-width: 90%;
}

.modal-buttons {
  display: flex;
  justify-content: space-between;
}
</style>

<script>
(function() {
    const modal = document.getElementById("testimonialModal");
    if (!modal) return;

    // If user already closed in this session, remove popup
    if (sessionStorage.getItem("testimonialClosed")) {
        modal.remove();
        return;
    }

    window.closeModal = function() {
        sessionStorage.setItem("testimonialClosed", "true");
        modal.style.display = "none";
    };
})();
</script>

{% endif %}
